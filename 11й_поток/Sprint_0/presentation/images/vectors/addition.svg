<svg width="450" height="300" viewBox="-30 -220 380 260" xmlns="http://www.w3.org/2000/svg">
    <!-- Определение стрелок -->
    <defs>
      <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
        <path d="M0,0 L0,6 L9,3 z" fill="blue" />
      </marker>
      <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
        <path d="M0,0 L0,6 L9,3 z" fill="red" />
      </marker>
      <marker id="arrow-purple" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
        <path d="M0,0 L0,6 L9,3 z" fill="purple" />
      </marker>
    </defs>

    <!-- Координатная сетка (шаг 50 единиц = 1) -->
    <g stroke="#f0f0f0" stroke-width="1">
      <path d="M0,-200 L300,-200 M0,-150 L300,-150 M0,-100 L300,-100 M0,-50 L300,-50" />
      <path d="M50,0 L50,-200 M100,0 L100,-200 M150,0 L150,-200 M200,0 L200,-200 M250,0 L250,-200 M300,0 L300,-200" />
    </g>

    <!-- Оси координат -->
    <line x1="0" y1="0" x2="320" y2="0" stroke="#ccc" stroke-width="1" />
    <line x1="0" y1="0" x2="0" y2="-210" stroke="#ccc" stroke-width="1" />

    <!-- Вектор a (2, 2) -->
    <line x1="0" y1="0" x2="100" y2="-100" stroke="blue" stroke-width="3" marker-end="url(#arrow-blue)" />
    <circle cx="100" cy="-100" r="3" fill="blue" />
    <text x="95" y="-115" fill="blue" font-family="Arial" font-weight="bold" font-size="16">A</text>
    <text x="30" y="-40" fill="blue" font-family="Arial" font-size="12">a (2,2)</text>

    <!-- Вектор b (3, 0), отложенный от точки A -->
    <line x1="100" y1="-100" x2="250" y2="-100" stroke="red" stroke-width="3" marker-end="url(#arrow-red)" />
    <text x="160" y="-110" fill="red" font-family="Arial" font-size="12">b (3,0)</text>

    <!-- Результирующий вектор c (5, 2) -->
    <line x1="0" y1="0" x2="250" y2="-100" stroke="purple" stroke-width="3" marker-end="url(#arrow-purple)" />
    <circle cx="250" cy="-100" r="4" fill="purple" />
    <text x="255" y="-110" fill="purple" font-family="Arial" font-weight="bold" font-size="16">B</text>
    <text x="110" y="-20" fill="purple" font-family="Arial" font-weight="bold" font-size="14">c = a + b</text>

    <!-- Начало координат -->
    <circle cx="0" cy="0" r="4" fill="black" />
    <text x="-15" y="15" font-family="Arial" font-size="12">O (0,0)</text>
  </svg>
