<svg width="450" height="450" viewBox="-150 -250 400 400" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
        <path d="M0,0 L0,6 L9,3 Z" fill="context-stroke" />
      </marker>
    </defs>

    <!-- Сетка (1 единица = 80px) -->
    <path d="M -150,-160 L 250,-160 M -150,-80 L 250,-80 M -150,0 L 250,0 M -150,80 L 250,80
             M -80,-250 L -80,150 M 0,-250 L 0,150 M 80,-250 L 80,150 M 160,-250 L 160,150 M 240,-250 L 240,150" stroke="#f0f0f0" stroke-width="1" />

    <!-- Оси координат -->
    <line x1="-130" y1="0" x2="230" y2="0" stroke="#666" stroke-width="2" marker-end="url(#arrow)" />
    <line x1="0" y1="130" x2="0" y2="-230" stroke="#666" stroke-width="2" marker-end="url(#arrow)" />
    <text x="210" y="20" font-family="Arial" font-size="14" fill="#666">Re</text>
    <text x="10" y="-215" font-family="Arial" font-size="14" fill="#666">Im</text>

    <!-- Вектор z1 = 1 + 3i -->
    <line x1="0" y1="0" x2="80" y2="-240" stroke="blue" stroke-width="3" marker-end="url(#arrow)" />
    <text x="85" y="-230" font-family="Arial" font-size="14" fill="blue" font-weight="bold">z₁=1+3i</text>

    <!-- Вектор z2 = 3 - i -->
    <line x1="0" y1="0" x2="240" y2="80" stroke="orange" stroke-width="3" marker-end="url(#arrow)" />
    <text x="180" y="100" font-family="Arial" font-size="14" fill="orange" font-weight="bold">z₂=3-i</text>

    <!-- Вектор z3 = z1 / z2 = i -->
    <line x1="0" y1="0" x2="0" y2="-80" stroke="red" stroke-width="4" marker-end="url(#arrow)" />
    <circle cx="0" cy="-80" r="4" fill="red" />
    <text x="-100" y="-90" font-family="Arial" font-size="16" fill="red" font-weight="bold">z₃ = z₁/z₂ = i</text>

    <!-- Точка начала координат -->
    <circle cx="0" cy="0" r="3" fill="black" />
</svg>
