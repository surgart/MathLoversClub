<svg width="450" height="450" viewBox="-250 -350 500 500" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
        <path d="M0,0 L0,6 L9,3 Z" fill="context-stroke" />
      </marker>
    </defs>

    <!-- Сетка -->
    <path d="M -250,-300 L 250,-300 M -250,-200 L 250,-200 M -250,-100 L 250,-100 M -250,0 L 250,0 M -250,100 L 250,100
             M -200,-350 L -200,150 M -100,-350 L -100,150 M 0,-350 L 0,150 M 100,-350 L 100,150 M 200,-350 L 200,150" stroke="#f0f0f0" stroke-width="1" />

    <!-- Оси координат -->
    <line x1="-230" y1="0" x2="230" y2="0" stroke="#666" stroke-width="2" marker-end="url(#arrow)" />
    <line x1="0" y1="130" x2="0" y2="-330" stroke="#666" stroke-width="2" marker-end="url(#arrow)" />
    <text x="210" y="20" font-family="Arial" font-size="14" fill="#666">Re</text>
    <text x="10" y="-315" font-family="Arial" font-size="14" fill="#666">Im</text>

    <!-- Вектор z1 = 1 + 3i (Синий) -->
    <line x1="0" y1="0" x2="50" y2="-150" stroke="blue" stroke-width="3" marker-end="url(#arrow)" />
    <text x="55" y="-155" font-family="Arial" font-size="14" fill="blue" font-weight="bold">z₁=1+3i</text>

    <!-- Вектор z2 = 3 - i (Оранжевый) -->
    <line x1="0" y1="0" x2="150" y2="50" stroke="orange" stroke-width="3" marker-end="url(#arrow)" />
    <text x="155" y="70" font-family="Arial" font-size="14" fill="orange" font-weight="bold">z₂=3-i</text>

    <!-- Вектор z3 = z1 - z2 = -2 + 4i (Красный) -->
    <line x1="0" y1="0" x2="-100" y2="-200" stroke="red" stroke-width="4" marker-end="url(#arrow)" />
    <circle cx="-100" cy="-200" r="4" fill="red" />
    <text x="-210" y="-210" font-family="Arial" font-size="16" fill="red" font-weight="bold">z₃ = z₁-z₂ = -2+4i</text>

    <!-- Пунктир для наглядности (вектор от z2 к z1) -->
    <line x1="150" y1="50" x2="50" y2="-150" stroke="red" stroke-width="1.5" stroke-dasharray="4" opacity="0.5" />

    <!-- Центр -->
    <circle cx="0" cy="0" r="3" fill="black" />
</svg>
