<svg width="450" height="450" viewBox="-250 -250 500 500" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
        <path d="M0,0 L0,6 L9,3 Z" fill="context-stroke" />
      </marker>
    </defs>

    <!-- Сетка (1 единица = 80px) -->
    <path d="M -250,-160 L 250,-160 M -250,-80 L 250,-80 M -250,0 L 250,0 M -250,80 L 250,80 M -250,160 L 250,160
             M -160,-250 L -160,250 M -80,-250 L -80,250 M 0,-250 L 0,250 M 80,-250 L 80,250 M 160,-250 L 160,250" stroke="#f4f4f4" stroke-width="1" />

    <!-- Оси -->
    <line x1="-230" y1="0" x2="230" y2="0" stroke="#666" stroke-width="2" marker-end="url(#arrow)" />
    <line x1="0" y1="230" x2="0" y2="-230" stroke="#666" stroke-width="2" marker-end="url(#arrow)" />
    <text x="215" y="20" font-family="Arial" font-size="14" fill="#666">Re</text>
    <text x="10" y="-215" font-family="Arial" font-size="14" fill="#666">Im</text>

    <!-- Окружность, на которой лежат корни (r = sqrt(5)) -->
    <circle cx="0" cy="0" r="178.8" stroke="#ddd" stroke-width="1" fill="none" stroke-dasharray="5,5" />

    <!-- Корень w0 = 2 - i -->
    <line x1="0" y1="0" x2="160" y2="80" stroke="red" stroke-width="3" marker-end="url(#arrow)" />
    <text x="165" y="100" font-family="Arial" font-size="14" fill="red" font-weight="bold">w₀=2-i</text>

    <!-- Корень w1 -->
    <line x1="0" y1="0" x2="-10.7" y2="-178.5" stroke="red" stroke-width="3" marker-end="url(#arrow)" />
    <text x="-40" y="-190" font-family="Arial" font-size="12" fill="red">w₁</text>

    <!-- Корень w2 -->
    <line x1="0" y1="0" x2="-149.3" y2="98.5" stroke="red" stroke-width="3" marker-end="url(#arrow)" />
    <text x="-190" y="115" font-family="Arial" font-size="12" fill="red">w₂</text>

    <!-- Равносторонний треугольник между корнями -->
    <path d="M 160,80 L -10.7,-178.5 L -149.3,98.5 Z" stroke="red" stroke-width="1" fill="red" fill-opacity="0.05" />

    <circle cx="0" cy="0" r="3" fill="black" />
</svg>
