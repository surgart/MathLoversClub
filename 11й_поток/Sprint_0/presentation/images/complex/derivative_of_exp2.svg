<svg width="400" height="365" viewBox="-150 -170 340 310" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <!-- Маркеры стрелок -->
      <marker id="axis-arrow" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
        <path d="M0,0 L6,3 L0,6 Z" fill="#666" />
      </marker>
      <marker id="arrow-black" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
        <path d="M0,0 L6,3 L0,6 Z" fill="black" />
      </marker>
      <marker id="arrow-blue" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
        <path d="M0,0 L6,3 L0,6 Z" fill="blue" />
      </marker>
      <marker id="arrow-red" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
        <path d="M0,0 L6,3 L0,6 Z" fill="red" />
      </marker>
      <marker id="arrow-orange" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
        <path d="M0,0 L6,3 L0,6 Z" fill="orange" />
      </marker>
    </defs>

    <!-- Оси координат -->
    <line x1="-140" y1="0" x2="160" y2="0" stroke="#666" stroke-width="1" marker-end="url(#axis-arrow)" />
    <line x1="0" y1="130" x2="0" y2="-160" stroke="#666" stroke-width="1" marker-end="url(#axis-arrow)" />
    <text x="140" y="15" font-family="Arial" font-size="10" fill="#666" font-weight="bold">cos</text>
    <text x="140" y="-10" font-family="Arial" font-size="14" fill="black" font-weight="bold">Re</text>
    <text x="10" y="-150" font-family="Arial" font-size="10" fill="#666" font-weight="bold">sin</text>
    <text x="-30" y="-150" font-family="Arial" font-size="14" fill="black" font-weight="bold">Im</text>

    <!-- 1. Тригонометрическая окружность -->
    <circle cx="0" cy="0" r="100" stroke="green" stroke-width="2" fill="none" />

    <!-- 2. Числа внутри окружности -->
    <text x="87" y="18" font-family="Arial" font-size="11" fill="#666">1</text>
    <text x="-95" y="18" font-family="Arial" font-size="11" fill="#666">-1</text>
    <text x="5" y="-82" font-family="Arial" font-size="11" fill="#666">i</text>
    <text x="5" y="95" font-family="Arial" font-size="11" fill="#666">-i</text>

    <!-- Исходный вектор eⁱᵠ -->
    <line x1="0" y1="0" x2="70.7" y2="-70.7" stroke="blue" stroke-width="3" marker-end="url(#arrow-blue)" />
    <circle cx="70.7" cy="-70.7" r="3" fill="blue" />
    <text x="75" y="-75" font-family="Arial" font-size="12" font-weight="bold" fill="blue">eⁱᵠ</text>

    <path d="M 45,0 A 45,45 0 0,0 31.8,-31.8" stroke="black" stroke-width="2" fill="none" />
    <text x="50" y="-30" font-family="Arial" font-size="12" fill="black" font-weight="bold">φ</text>

    <!-- 1. Вектор i * eⁱᵠ -->
    <line x1="70.7" y1="-70.7" x2="0" y2="-141.4" stroke="orange" stroke-width="3" marker-end="url(#arrow-orange)" />
    <circle cx="0" cy="-141.4" r="3" fill="orange" />
    <text x="-30" y="-135" font-family="Arial" font-size="12" font-weight="bold" fill="orange">i·eⁱᵠ</text>

    <!-- 2. Вектор i² * eⁱᵠ -->
    <line x1="70.7" y1="-70.7" x2="5" y2="-5" stroke="red" stroke-width="3" marker-end="url(#arrow-red)" />
    <text x="18" y="-45" font-family="Arial" font-size="12" font-weight="bold" fill="red">i²·eⁱᵠ</text>

    <!-- 10. Перпендикуляры -->
    <line x1="70.7" y1="0" x2="70.7" y2="-70.7" stroke="black" stroke-dasharray="2" />
    <line x1="0" y1="-70.7" x2="70.7" y2="-70.7" stroke="black" stroke-dasharray="2" />
    <text x="52" y="18" font-family="Arial" font-size="11" fill="black">cos(φ)</text>
    <text x="-35" y="-67" font-family="Arial" font-size="11" fill="black">sin(φ)</text>

    <circle cx="0" cy="0" r="3" fill="black" />
    <text x="-15" y="15" font-family="Arial" font-size="14" font-weight="bold">O</text>
</svg>