<svg viewBox="0 0 250 250" xmlns="http://www.w3.org/2000/svg">
    <style>
      .shape { fill: #f0f9ff; stroke: black; stroke-width: 2; }
      .line { stroke: black; stroke-width: 1; fill: none; }
      .text { font-family: 'Times New Roman', serif; font-size: 20px; font-style: italic; }
    </style>

    <!-- Прямоугольный треугольник -->
    <path d="M 50 50 L 50 200 L 200 200 Z" class="shape" />

    <!-- Обозначение прямого угла -->
    <path d="M 50 185 L 65 185 L 65 200" class="line" />

    <!-- Подписи катетов -->
    <text x="30" y="135" class="text">1</text>
    <text x="120" y="225" class="text">1</text>

    <!-- Подпись гипотенузы -->
    <text x="135" y="125" class="text">√2</text>
  </svg>
